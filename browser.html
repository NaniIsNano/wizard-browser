<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Wizard Browser</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: #0d0d0d;
  color: #e0e0e0;
  overflow: hidden;
  height: 48px;
}
#toolbar {
  display: flex;
  align-items: center;
  height: 48px;
  background: #161616;
  padding: 0 10px;
  gap: 6px;
  border-bottom: 1px solid #2a2a2a;
  -webkit-app-region: drag;
}
#toolbar > * { -webkit-app-region: no-drag; }
.nav-btn {
  width: 30px;
  height: 30px;
  border: none;
  background: transparent;
  color: #888;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: all 0.15s;
}
.nav-btn:hover { background: #1a1a1a; color: #fff; }
.nav-btn:active { background: #252525; }
.nav-btn svg { width: 16px; height: 16px; fill: currentColor; }
#url-bar {
  flex: 1;
  height: 32px;
  border: 1px solid #252525;
  background: #141414;
  color: #ccc;
  padding: 0 14px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  border-radius: 8px;
  outline: none;
  transition: all 0.2s;
}
#url-bar:focus { border-color: #7c3aed; background: #1a1a1a; color: #fff; }
#url-bar::placeholder { color: #555; }
#shield {
  display: flex;
  align-items: center;
  gap: 5px;
  background: #141414;
  border: 1px solid #252525;
  border-radius: 8px;
  padding: 0 10px;
  height: 32px;
  font-size: 12px;
  font-weight: 500;
  color: #22c55e;
  cursor: default;
  user-select: none;
}
#shield svg { width: 14px; height: 14px; fill: #22c55e; }
#clear-btn {
  height: 32px;
  border: 1px solid #252525;
  background: #141414;
  color: #888;
  padding: 0 12px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
#clear-btn:hover { background: #1a1a1a; color: #ef4444; border-color: #ef4444; }
.toolbar-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 32px;
  border: 1px solid #252525;
  background: #141414;
  color: #888;
  padding: 0 10px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.toolbar-btn:hover { background: #1a1a1a; color: #a855f7; border-color: #a855f7; }
.toolbar-btn.active { background: #1a0a2e; color: #a855f7; border-color: #a855f7; }
.toolbar-btn.active:hover { background: #250e3f; }
#loading-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, #7c3aed, #a855f7, #c084fc);
  width: 0%;
  transition: width 0.4s ease;
  z-index: 9999;
  box-shadow: 0 0 8px rgba(124, 58, 237, 0.6);
}

/* Onion banner */
#onion-banner {
  display: none;
  position: fixed;
  top: 48px;
  left: 0;
  right: 0;
  background: #1a0a2e;
  border-bottom: 1px solid #7c3aed;
  padding: 8px 16px;
  z-index: 100;
  font-size: 13px;
  color: #d4b5ff;
  align-items: center;
  gap: 10px;
}
#onion-banner.show { display: flex; }
#onion-banner button {
  background: #7c3aed;
  color: #fff;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  font-weight: 500;
}
#onion-banner button:hover { background: #9333ea; }
#onion-banner .dismiss {
  background: transparent;
  color: #888;
  margin-left: auto;
  font-size: 16px;
  padding: 2px 6px;
}
#onion-banner .dismiss:hover { color: #fff; }

/* Download manager panel */
#download-panel {
  display: none;
  position: fixed;
  bottom: 0;
  right: 16px;
  width: 360px;
  max-height: 300px;
  background: #141414;
  border: 1px solid #252525;
  border-bottom: none;
  border-radius: 10px 10px 0 0;
  z-index: 1000;
  overflow: hidden;
  flex-direction: column;
}
#download-panel.show { display: flex; }
#dl-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid #252525;
  font-size: 13px;
  font-weight: 600;
  color: #e0e0e0;
}
#dl-header button {
  background: transparent;
  border: none;
  color: #888;
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
}
#dl-header button:hover { color: #fff; background: #252525; }
#dl-list {
  overflow-y: auto;
  flex: 1;
  max-height: 250px;
}
.dl-item {
  padding: 10px 14px;
  border-bottom: 1px solid #1e1e1e;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.dl-item:last-child { border-bottom: none; }
.dl-filename {
  font-size: 12px;
  font-weight: 500;
  color: #e0e0e0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dl-progress-bar {
  height: 4px;
  background: #252525;
  border-radius: 2px;
  overflow: hidden;
}
.dl-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #a855f7);
  border-radius: 2px;
  transition: width 0.3s;
}
.dl-info {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #888;
}
.dl-actions {
  display: flex;
  gap: 8px;
  margin-top: 2px;
}
.dl-actions button {
  background: transparent;
  border: none;
  color: #7c3aed;
  cursor: pointer;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  padding: 0;
}
.dl-actions button:hover { color: #a855f7; text-decoration: underline; }

/* Update banner */
#update-banner {
  display: none;
  position: fixed;
  top: 48px;
  left: 0;
  right: 0;
  background: #0a2e1a;
  border-bottom: 1px solid #22c55e;
  padding: 8px 16px;
  z-index: 99;
  font-size: 13px;
  color: #b5ffd4;
  align-items: center;
  gap: 10px;
}
#update-banner.show { display: flex; }
#update-banner a {
  color: #22c55e;
  text-decoration: underline;
  cursor: pointer;
}
#update-banner .dismiss {
  background: transparent;
  border: none;
  color: #888;
  margin-left: auto;
  font-size: 16px;
  padding: 2px 6px;
  cursor: pointer;
}
#update-banner .dismiss:hover { color: #fff; }

/* Bookmarks panel */
#bookmarks-panel {
  display: none;
  position: fixed;
  top: 48px;
  right: 16px;
  width: 360px;
  max-height: 400px;
  background: #141414;
  border: 1px solid #252525;
  border-radius: 0 0 10px 10px;
  z-index: 1000;
  overflow: hidden;
  flex-direction: column;
}
#bookmarks-panel.show { display: flex; }
#bm-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid #252525;
  font-size: 13px;
  font-weight: 600;
  color: #e0e0e0;
}
#bm-header button {
  background: transparent;
  border: none;
  color: #888;
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
}
#bm-header button:hover { color: #fff; background: #252525; }
#bm-list {
  overflow-y: auto;
  flex: 1;
  max-height: 350px;
}
.bm-item {
  padding: 8px 14px;
  border-bottom: 1px solid #1e1e1e;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
}
.bm-item:hover { background: #1a1a1a; }
.bm-item:last-child { border-bottom: none; }
.bm-title {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  color: #e0e0e0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bm-url {
  font-size: 10px;
  color: #555;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 140px;
}
.bm-remove {
  background: transparent;
  border: none;
  color: #555;
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  flex-shrink: 0;
}
.bm-remove:hover { color: #ef4444; background: #1e1e1e; }
.bm-empty {
  padding: 20px;
  text-align: center;
  color: #555;
  font-size: 12px;
}

/* PIN lock overlay */
#pin-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0a0a0a;
  z-index: 10000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
#pin-overlay.show { display: flex; }
#pin-overlay h2 {
  font-size: 1.4em;
  font-weight: 600;
  color: #e0e0e0;
}
#pin-overlay p {
  color: #888;
  font-size: 13px;
  max-width: 350px;
  text-align: center;
}
#pin-input {
  width: 200px;
  height: 40px;
  text-align: center;
  font-size: 24px;
  letter-spacing: 8px;
  background: #141414;
  border: 1px solid #252525;
  color: #e0e0e0;
  border-radius: 8px;
  outline: none;
  font-family: 'Inter', sans-serif;
}
#pin-input:focus { border-color: #7c3aed; }
.pin-btn {
  padding: 8px 24px;
  background: #7c3aed;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: background 0.15s;
}
.pin-btn:hover { background: #9333ea; }
.pin-skip {
  background: transparent;
  border: none;
  color: #555;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  padding: 4px 8px;
}
.pin-skip:hover { color: #888; }
#pin-error {
  color: #ef4444;
  font-size: 12px;
  min-height: 16px;
}
</style>
</head>
<body>
<!-- PIN lock overlay -->
<div id="pin-overlay">
  <h2 id="pin-title">Set Up PIN Lock</h2>
  <p id="pin-desc">Protect your browser with a PIN code. You'll need to enter it each time you open Wizard Browser.</p>
  <input type="password" id="pin-input" maxlength="6" placeholder="----" autocomplete="off" />
  <div id="pin-error"></div>
  <button class="pin-btn" id="pin-submit">Set PIN</button>
  <button class="pin-skip" id="pin-skip">Skip</button>
</div>

<div id="toolbar">
  <button class="nav-btn" id="btn-back" title="Back">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="nav-btn" id="btn-forward" title="Forward">
    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
  </button>
  <button class="nav-btn" id="btn-reload" title="Reload">
    <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
  </button>
  <button class="nav-btn" id="btn-home" title="Home">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
  </button>
  <input type="text" id="url-bar" placeholder="Search or enter URL..." spellcheck="false" />
  <div id="shield" title="Trackers blocked this session">

  </button>
  <button class="toolbar-btn" id="bookmarks-toggle" title="Bookmarks">

  </button>
  <button class="toolbar-btn" id="tor-btn" title="Connect via Tor (SOCKS5 proxy on 127.0.0.1:9050)">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/></svg>
    <span>TOR</span>
  </button>
  <button class="toolbar-btn" id="irc-btn" title="IRC #wizard-support">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" fill="currentColor"/></svg>
    <span>IRC</span>
  </button>
  <button class="toolbar-btn" id="dl-btn" title="Downloads">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>
  </button>
  <button class="toolbar-btn" id="settings-btn" title="Settings">
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/></svg>
  </button>
  <button id="clear-btn" title="Clear all browsing data">CLEAR</button>
  <div id="loading-bar"></div>
</div>

<!-- Onion site available banner -->
<div id="onion-banner">
  <svg viewBox="0 0 24 24" width="16" height="16" style="fill: #a855f7; flex-shrink: 0;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
  <span id="onion-text">.onion version available</span>
  <button id="onion-go">Switch to .onion</button>
  <button class="dismiss" id="onion-dismiss">&times;</button>
</div>

<!-- Update available banner -->
<div id="update-banner">
  <span id="update-text">A new version is available!</span>
  <button id="update-install" style="background:#22c55e;color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:500;">Restart & Update</button>
  <button class="dismiss" id="update-dismiss">&times;</button>
</div>

<!-- Download manager -->
<div id="download-panel">
  <div id="dl-header">
    <span>Downloads</span>
    <button id="dl-close">&times;</button>
  </div>
  <div id="dl-list"></div>
</div>

<!-- Bookmarks panel -->
<div id="bookmarks-panel">
  <div id="bm-header">
    <span>Bookmarks</span>
    <button id="bm-close">&times;</button>
  </div>
  <div id="bm-list"></div>
</div>

<script>
const urlBar = document.getElementById('url-bar');
const blockedSpan = document.getElementById('blocked-count');
const loadingBar = document.getElementById('loading-bar');

// --- PIN Lock ---
(async () => {
  const pinState = await window.wizardBrowser.getPinState();
  const overlay = document.getElementById('pin-overlay');
  const pinInput = document.getElementById('pin-input');
  const pinSubmit = document.getElementById('pin-submit');
  const pinSkip = document.getElementById('pin-skip');
  const pinTitle = document.getElementById('pin-title');
  const pinDesc = document.getElementById('pin-desc');
  const pinError = document.getElementById('pin-error');

  if (pinState.enabled) {
    // PIN is set — require verification
    overlay.classList.add('show');
    pinTitle.textContent = 'Enter PIN';
    pinDesc.textContent = 'Enter your PIN to unlock Wizard Browser.';
    pinSubmit.textContent = 'Unlock';
    pinSkip.style.display = 'none';
    pinInput.focus();

    pinSubmit.onclick = async () => {
      const pin = pinInput.value;
      if (pin.length < 4) { pinError.textContent = 'PIN must be at least 4 digits'; return; }
      const ok = await window.wizardBrowser.verifyPin(pin);
      if (ok) {
        overlay.classList.remove('show');
      } else {
        pinError.textContent = 'Incorrect PIN';
        pinInput.value = '';
        pinInput.focus();
      }
    };
    pinInput.onkeydown = (e) => { if (e.key === 'Enter') pinSubmit.click(); };
  } else if (!pinState.asked) {
    // First launch — ask if they want to set a PIN
    overlay.classList.add('show');
    pinInput.focus();

    pinSubmit.onclick = async () => {
      const pin = pinInput.value;
      if (pin.length < 4) { pinError.textContent = 'PIN must be at least 4 digits'; return; }
      await window.wizardBrowser.setPin({ pin, enabled: true });
      overlay.classList.remove('show');
    };
    pinSkip.onclick = async () => {
      await window.wizardBrowser.skipPinSetup();
      overlay.classList.remove('show');
    };
    pinInput.onkeydown = (e) => { if (e.key === 'Enter') pinSubmit.click(); };
  }
})();

urlBar.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = urlBar.value.trim();
    if (val) window.wizardBrowser.navigate(val);
    urlBar.blur();
  }
});
urlBar.addEventListener('focus', () => urlBar.select());

document.getElementById('btn-back').addEventListener('click', () => window.wizardBrowser.goBack());
document.getElementById('btn-forward').addEventListener('click', () => window.wizardBrowser.goForward());
document.getElementById('btn-reload').addEventListener('click', () => window.wizardBrowser.reload());
document.getElementById('btn-home').addEventListener('click', () => window.wizardBrowser.goHome());
document.getElementById('clear-btn').addEventListener('click', async () => {
  await window.wizardBrowser.clearAllData();
  blockedSpan.textContent = '0';
});

// Settings button
document.getElementById('settings-btn').addEventListener('click', () => {
  window.wizardBrowser.openSettings();
});

// IRC button
document.getElementById('irc-btn').addEventListener('click', () => {
  window.wizardBrowser.openIRC();
});

// --- Bookmark this page ---
let currentUrl = '';
let currentTitle = '';
document.getElementById('bookmark-btn').addEventListener('click', async () => {
  if (!currentUrl || currentUrl.startsWith('file://')) return;
  await window.wizardBrowser.addBookmark({ title: currentTitle || currentUrl, url: currentUrl });
  renderBookmarks();
});

// --- Bookmarks panel ---
const bmToggle = document.getElementById('bookmarks-toggle');
const bmPanel = document.getElementById('bookmarks-panel');
const bmList = document.getElementById('bm-list');
const bmClose = document.getElementById('bm-close');

bmToggle.addEventListener('click', () => {
  bmPanel.classList.toggle('show');
  if (bmPanel.classList.contains('show')) renderBookmarks();
});
bmClose.addEventListener('click', () => bmPanel.classList.remove('show'));

async function renderBookmarks() {
  const bms = await window.wizardBrowser.getBookmarks();
  bmList.innerHTML = '';
  if (bms.length === 0) {
    bmList.innerHTML = '<div class="bm-empty">No bookmarks yet. Click the bookmark icon to add pages.</div>';
    return;
  }
  bms.forEach(bm => {
    const div = document.createElement('div');
    div.className = 'bm-item';
    div.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="bm-title">${escapeHtml(bm.title)}</div>
        <div class="bm-url">${escapeHtml(bm.url)}</div>
      </div>
      <button class="bm-remove" title="Remove">&times;</button>
    `;
    div.querySelector('.bm-title').addEventListener('click', () => {
      window.wizardBrowser.openBookmark(bm.url);
      bmPanel.classList.remove('show');
    });
    div.querySelector('.bm-remove').addEventListener('click', async (e) => {
      e.stopPropagation();
      await window.wizardBrowser.removeBookmark(bm.url);
      renderBookmarks();
    });
    bmList.appendChild(div);
  });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

window.wizardBrowser.onBookmarkAdded(() => {
  renderBookmarks();
});

// Tor toggle
const torBtn = document.getElementById('tor-btn');
let torActive = false;
torBtn.addEventListener('click', async () => {
  torActive = !torActive;
  const result = await window.wizardBrowser.toggleTor(torActive);
  if (result) {
    torBtn.classList.toggle('active', torActive);
  } else {
    torActive = false;
    torBtn.classList.remove('active');
  }
});

// --- Download Manager ---
const dlBtn = document.getElementById('dl-btn');
const dlPanel = document.getElementById('download-panel');
const dlList = document.getElementById('dl-list');
const dlClose = document.getElementById('dl-close');
let dlItems = {};

dlBtn.addEventListener('click', () => {
  dlPanel.classList.toggle('show');
});
dlClose.addEventListener('click', () => {
  dlPanel.classList.remove('show');
});

function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function renderDownload(dl) {
  let el = document.getElementById('dl-' + dl.id);
  const pct = dl.totalBytes > 0 ? Math.round((dl.receivedBytes / dl.totalBytes) * 100) : 0;
  const isDone = dl.state === 'completed';
  const isFailed = dl.state === 'cancelled' || dl.state === 'interrupted';

  if (!el) {
    el = document.createElement('div');
    el.className = 'dl-item';
    el.id = 'dl-' + dl.id;
    dlList.prepend(el);
    // Auto-show panel
    dlPanel.classList.add('show');
  }

  el.innerHTML = `
    <div class="dl-filename" title="${dl.filename}">${dl.filename}</div>
    ${!isDone && !isFailed ? `
    <div class="dl-progress-bar"><div class="dl-progress-fill" style="width:${pct}%"></div></div>
    ` : ''}
    <div class="dl-info">
      <span>${isDone ? 'Completed' : isFailed ? 'Failed' : formatBytes(dl.receivedBytes) + ' / ' + formatBytes(dl.totalBytes)}</span>
      <span>${isDone ? formatBytes(dl.totalBytes) : pct + '%'}</span>
    </div>
    ${isDone ? `
    <div class="dl-actions">
      <button onclick="window.wizardBrowser.openDownload('${dl.path.replace(/\\/g, '\\\\')}')">Open</button>
      <button onclick="window.wizardBrowser.showDownload('${dl.path.replace(/\\/g, '\\\\')}')">Show in folder</button>
    </div>
    ` : ''}
  `;
}

window.wizardBrowser.onDownloadStarted((dl) => {
  dlItems[dl.id] = dl;
  renderDownload(dl);
});
window.wizardBrowser.onDownloadUpdated((dl) => {
  dlItems[dl.id] = dl;
  renderDownload(dl);
});
window.wizardBrowser.onDownloadDone((dl) => {
  dlItems[dl.id] = dl;
  renderDownload(dl);
});

// --- Onion detection ---
const onionBanner = document.getElementById('onion-banner');
const onionText = document.getElementById('onion-text');
const onionGo = document.getElementById('onion-go');
const onionDismiss = document.getElementById('onion-dismiss');
let currentOnion = null;

window.wizardBrowser.onOnionAvailable((data) => {
  if (!torActive) return; // Only show when Tor is active
  currentOnion = data.onion;
  onionText.textContent = `.onion version available for ${data.clearnet}`;
  onionBanner.classList.add('show');
});

onionGo.addEventListener('click', () => {
  if (currentOnion) window.wizardBrowser.navigateOnion(currentOnion);
  onionBanner.classList.remove('show');
});
onionDismiss.addEventListener('click', () => {
  onionBanner.classList.remove('show');
});

// Hide onion banner on navigation
window.wizardBrowser.onUrlChange((url) => {
  currentUrl = url;
  urlBar.value = url.startsWith('file://') ? '' : url;
  onionBanner.classList.remove('show');
});

// --- Auto-update (electron-updater) ---
if (window.wizardBrowser.onUpdateStatus) {
  window.wizardBrowser.onUpdateStatus((data) => {
    const banner = document.getElementById('update-banner');
    const text = document.getElementById('update-text');
    const installBtn = document.getElementById('update-install');

    if (data.status === 'downloading') {
      text.textContent = `Downloading update v${data.version}...`;
      installBtn.style.display = 'none';
      banner.classList.add('show');
    } else if (data.status === 'ready') {
      text.textContent = `Update v${data.version} ready to install`;
      installBtn.style.display = '';
      banner.classList.add('show');
    } else if (data.status === 'error') {
      text.textContent = `Auto-update error: ${data.message}`;
      installBtn.style.display = 'none';
      banner.classList.add('show');
      banner.style.background = '#2e0a0a';
      banner.style.borderColor = '#ef4444';
    }
  });
}
document.getElementById('update-install').addEventListener('click', () => {
  window.wizardBrowser.installUpdate();
});
document.getElementById('update-dismiss').addEventListener('click', () => {
  document.getElementById('update-banner').classList.remove('show');
});

// --- Events ---
window.wizardBrowser.onTitleChange((title) => {
  currentTitle = title;
  document.title = title + ' — Wizard';
});
window.wizardBrowser.onLoadingChange((loading) => {
  if (loading) {
    loadingBar.style.width = '70%';
  } else {
    loadingBar.style.width = '100%';
    setTimeout(() => {
      loadingBar.style.transition = 'none';
      loadingBar.style.width = '0%';
      setTimeout(() => { loadingBar.style.transition = 'width 0.3s'; }, 50);
    }, 300);
  }
});
window.wizardBrowser.onBlockedUpdate((count) => {
  blockedSpan.textContent = count;
});

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'l') { urlBar.focus(); e.preventDefault(); }
  if (e.altKey && e.key === 'ArrowLeft') window.wizardBrowser.goBack();
  if (e.altKey && e.key === 'ArrowRight') window.wizardBrowser.goForward();
  if (e.key === 'F5') window.wizardBrowser.reload();
  if (e.ctrlKey && e.key === 'j') { dlPanel.classList.toggle('show'); e.preventDefault(); }
  if (e.ctrlKey && e.key === 'b') { bmPanel.classList.toggle('show'); if (bmPanel.classList.contains('show')) renderBookmarks(); e.preventDefault(); }
  if (e.ctrlKey && e.key === 'd') { document.getElementById('bookmark-btn').click(); e.preventDefault(); }
});
</script>
</body>
</html>
